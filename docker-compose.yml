services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockly}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5416:5432"
    volumes:
      - stockly_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-stockly}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-stockly}?schema=public
      APP_URL: ${APP_URL:-http://localhost:5600}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-session-secret-in-portainer}
      KIOSK_SECRET: ${KIOSK_SECRET:-change-this-kiosk-secret-in-portainer}
      AUTO_SEED: ${AUTO_SEED:-true}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5600:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  stockly_postgres_data:
